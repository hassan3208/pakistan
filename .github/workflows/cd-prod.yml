name: CD - Production
on:
  push:
    branches: [ main ]
jobs:
  cd-prod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render (Production)
        env:
          RENDER_DEPLOY_HOOK_PROD_URL: ${{ secrets.RENDER_DEPLOY_HOOK_PROD_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_PROD_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_PROD_URL is not set; skipping Render deployment."
            exit 0
          fi

          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_PROD_URL"

      - name: Confirm Deployment
        run: echo "Deployed to Production at $(date)"
