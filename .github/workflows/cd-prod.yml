name: CD - Production
on:
  push:
    branches: [ main ]
jobs:
  cd-prod:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render (Production)
        run: |
          curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_PROD_URL }}"

      - name: Confirm Deployment
        run: echo "Deployed to Production at $(date)"
