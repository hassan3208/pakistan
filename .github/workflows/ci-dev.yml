name: CI - Development
on:
  pull_request:
    branches: [ dev ]
jobs:
  ci-dev:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint HTML
        run: npx --yes htmlhint "**/*.html"

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false

      - name: Tag and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:dev-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:dev-${{ github.sha }}
