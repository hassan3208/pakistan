name: CI - Staging

on:
  pull_request:
    branches: [ staging ]

jobs:
  ci-staging:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint HTML
        run: npx --yes htmlhint **/*.html

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false

      - name: Tag and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-latest
            ${{ secrets.DOCKERHUB_USERNAME }}/pakvista:staging-${{ github.sha }}