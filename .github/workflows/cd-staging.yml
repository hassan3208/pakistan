name: CD - Staging
on:
  push:
    branches: [staging]
jobs:
  cd-staging:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Deploy to Render (Staging)
        env:
          RENDER_DEPLOY_HOOK_STAGING_URL: ${{ secrets.RENDER_DEPLOY_HOOK_STAGING_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_STAGING_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_STAGING_URL is not set; skipping Render deployment."
            exit 0
          fi

          curl --fail --silent --show-error --request POST "$RENDER_DEPLOY_HOOK_STAGING_URL"
      - name: Confirm Deployment
        run: echo "Deployed to Staging at $(date)"
